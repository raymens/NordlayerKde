name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  linux-release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libdbus-1-dev rpm

      - name: Run tests
        run: cargo test --release --locked

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package tarball
        run: |
          mkdir -p dist
          cp target/release/nordlayer_kde dist/nordlayer_kde
          tar -C dist -czf dist/nordlayer-kde-linux-x86_64.tar.gz nordlayer_kde

      - name: Install cargo-generate-rpm
        run: cargo install --locked cargo-generate-rpm

      - name: Build RPM
        run: cargo generate-rpm

      - name: Generate checksums
        run: |
          sha256sum dist/nordlayer-kde-linux-x86_64.tar.gz > dist/SHA256SUMS.txt
          sha256sum target/generate-rpm/*.rpm >> dist/SHA256SUMS.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/nordlayer-kde-linux-x86_64.tar.gz
            dist/SHA256SUMS.txt
            target/generate-rpm/*.rpm

